<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود / ثبت نام</title>
  <style>
    body { font-family: Vazirmatn, sans-serif; background: #111827; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .box { width: 90%; max-width: 350px; background: #1f2937; padding: 25px; border-radius: 15px; }
    input { width: 100%; padding: 10px; margin: 5px 0 15px; box-sizing: border-box; background: #374151; border: none; color: white; border-radius: 8px; }
    button { width: 100%; padding: 10px; cursor: pointer; border: none; border-radius: 8px; background: #7c5cfc; color: white; font-weight: bold; }
    .tab-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 8px; background: #111827; color: #9ca3af; border: 1px solid #374151; cursor: pointer; border-radius: 8px; }
    .tab-btn.active { background: #7c5cfc; color: white; border-color: #7c5cfc; }
    .link { text-align: center; font-size: 12px; color: #9ca3af; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>

<div class="box">
  <h2 style="margin-bottom:20px; text-align:center;">تقویم روزانه</h2>

  <!-- فرم اصلی ورود -->
  <div id="auth-box">
    <div class="tab-row">
      <button class="tab-btn active" id="tab-login">ورود</button>
      <button class="tab-btn" id="tab-register">ثبت نام</button>
    </div>

    <div id="login-section">
      <input id="email" type="email" placeholder="ایمیل">
      <input id="password" type="password" placeholder="رمز عبور">
      <button id="main-btn">ورود</button>
      <div class="link" id="forgot-link">رمز عبور را فراموش کرده‌اید؟</div>
    </div>
  </div>

  <!-- فرم فراموشی رمز -->
  <div id="forgot-section" style="display:none;">
    <h3 style="text-align:center;">بازیابی رمز</h3>
    <input id="forgot-email" type="email" placeholder="ایمیل خود را وارد کنید">
    <button id="reset-btn">ارسال لینک بازیابی</button>
    <div class="link" onclick="location.reload()">بازگشت به ورود</div>
  </div>
</div>

<script type="module">
  import { supabase } from "./js/supabase.js";

  const isRegistering = () => document.getElementById('tab-register').classList.contains('active');

  document.getElementById('tab-login').onclick = () => {
    document.getElementById('tab-login').classList.add('active');
    document.getElementById('tab-register').classList.remove('active');
    document.getElementById('main-btn').textContent = "ورود";
  };

  document.getElementById('tab-register').onclick = () => {
    document.getElementById('tab-register').classList.add('active');
    document.getElementById('tab-login').classList.remove('active');
    document.getElementById('main-btn').textContent = "ثبت نام";
  };

  document.getElementById('main-btn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    if(isRegistering()) {
      const { error } = await supabase.auth.signUp({ email, password });
      if(error) alert(error.message); else alert("ثبت نام موفق! ایمیل خود را چک کنید.");
    } else {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if(error) alert("ایمیل یا رمز اشتباه است"); else window.location.href = "./index.html";
    }
  };

  // قابلیت فراموشی رمز
  document.getElementById('forgot-link').onclick = () => {
    document.getElementById('auth-box').style.display = 'none';
    document.getElementById('forgot-section').style.display = 'block';
  };

  document.getElementById('reset-btn').onclick = async () => {
    const email = document.getElementById('forgot-email').value;
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html',
    });
    if(error) alert(error.message); else alert("لینک بازیابی به ایمیل شما ارسال شد.");
  };
</script>
</body>
</html>
