<!-- Full updated login.html file -->
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#111827">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود | تقویم روزانه</title>

<style>
body{
  font-family: Vazirmatn,sans-serif;
  background:#111827;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.box {
  width: 90%;         
  max-width: 350px;   
  background: #1f2937;
  padding: 25px;
  border-radius: 15px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0 15px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:10px;
  cursor:pointer;
}

.hidden{
  display:none;
}
.tab-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.tab-btn {
  flex: 1;
  padding: 8px;
  border: 1px solid #374151;
  background: #111827;
  color: #9ca3af;
  border-radius: 8px;
  cursor: pointer;
  font-family: Vazirmatn, sans-serif;
}
.tab-btn.active {
  background: #7c5cfc;
  color: white;
  border-color: #7c5cfc;
}
@media (max-width: 400px) {
  body { padding: 12px; }
  .box { padding: 16px; border-radius: 12px; }
}

.err { color: #f87171; font-size: 13px; margin-top: -10px; margin-bottom: 10px; display: none; }
.link { color: #818cf8; cursor: pointer; font-size: 12px; text-decoration: underline; margin-bottom: 10px; display: block; text-align: center; }
</style>

</head>
<body>

<div class="box">

  <h2 style="margin-bottom:20px; text-align:center;">تقویم روزانه</h2>

  <div class="tab-row" id="auth-tabs">
    <button class="tab-btn active" id="tab-login">ورود</button>
    <button class="tab-btn" id="tab-register">ثبت نام</button>
  </div>

  <!-- فرم ورود -->
  <div id="login-section">
    <label>ایمیل</label>
    <input id="login-email" type="email" placeholder="example@email.com">
    <label>رمز</label>
    <input id="login-password" type="password" placeholder="رمز عبور">
    <span class="link" id="show-reset">رمز عبورم را فراموش کرده‌ام</span>
    <div class="err" id="login-err"></div>
    <button id="login-btn" style="background:#7c5cfc; color:white; border:none; border-radius:8px;">ورود</button>
  </div>

  <!-- فرم ثبت نام -->
  <div id="register-section" style="display:none">
    <label>نام نمایشی</label>
    <input id="register-name" placeholder="مثلاً: علی">
    <label>ایمیل</label>
    <input id="register-email" type="email" placeholder="example@email.com">
    <label>رمز</label>
    <input id="register-password" type="password" placeholder="حداقل ۶ کاراکتر">
    <div class="err" id="register-err"></div>
    <button id="register-btn" style="background:#7c5cfc; color:white; border:none; border-radius:8px;">ثبت نام</button>
  </div>

  <!-- فرم بازیابی رمز -->
  <div id="reset-section" style="display:none">
    <p style="font-size:13px; color:#d1d5db;">ایمیل خود را وارد کنید تا لینک تغییر رمز برایتان ارسال شود:</p>
    <input id="reset-email" type="email" placeholder="example@email.com">
    <div class="err" id="reset-err"></div>
    <button id="reset-btn" style="background:#7c5cfc; color:white; border:none; border-radius:8px;">ارسال لینک بازیابی</button>
    <span class="link" id="back-to-login" style="margin-top:10px;">بازگشت به ورود</span>
  </div>

</div>

<script type="module">
import { supabase } from "./js/supabase.js";

let registering = false;

// بررسی وضعیت ورود کاربر
supabase.auth.onAuthStateChange((event, session) => {
  if (session?.user && !registering) {
    window.location.href = "./index.html";
  }
});

// سوئیچ بین تب‌ها
document.getElementById("tab-login").onclick = () => {
  document.getElementById("login-section").style.display = "block";
  document.getElementById("register-section").style.display = "none";
  document.getElementById("reset-section").style.display = "none";
  document.getElementById("tab-login").classList.add("active");
  document.getElementById("tab-register").classList.remove("active");
  document.getElementById("auth-tabs").style.display = "flex";
};

document.getElementById("tab-register").onclick = () => {
  document.getElementById("register-section").style.display = "block";
  document.getElementById("login-section").style.display = "none";
  document.getElementById("reset-section").style.display = "none";
  document.getElementById("tab-register").classList.add("active");
  document.getElementById("tab-login").classList.remove("active");
  document.getElementById("auth-tabs").style.display = "flex";
};

// نمایش بخش بازیابی
document.getElementById("show-reset").onclick = () => {
  document.getElementById("login-section").style.display = "none";
  document.getElementById("register-section").style.display = "none";
  document.getElementById("reset-section").style.display = "block";
  document.getElementById("auth-tabs").style.display = "none";
};

document.getElementById("back-to-login").onclick = () => {
  document.getElementById("login-section").style.display = "block";
  document.getElementById("reset-section").style.display = "none";
  document.getElementById("auth-tabs").style.display = "flex";
};

// ورود
document.getElementById("login-btn").onclick = async () => {
  const email    = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const err      = document.getElementById("login-err");
  err.style.display = "none";

  if(!email || !password){ err.textContent = "ایمیل و رمز را وارد کنید"; err.style.display = "block"; return; }

  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) { err.textContent = "ایمیل یا رمز اشتباه است."; err.style.display = "block"; }
};

// ثبت نام
document.getElementById("register-btn").onclick = async () => {
  const name     = document.getElementById("register-name").value.trim();
  const email    = document.getElementById("register-email").value.trim();
  const password = document.getElementById("register-password").value;
  const err      = document.getElementById("register-err");
  err.style.display = "none";

  if(!name){ err.textContent = "نام را وارد کنید"; err.style.display = "block"; return; }
  if(!email){ err.textContent = "ایمیل را وارد کنید"; err.style.display = "block"; return; }
  if(password.length < 6){ err.textContent = "رمز باید حداقل ۶ کاراکتر باشد"; err.style.display = "block"; return; }

  try{
    registering = true;
    const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { display_name: name } } });
    if (error) throw error;
    if (data?.user) { await supabase.from("profiles").upsert({ id: data.user.id, name }); }
    registering = false;
    window.location.href = "./index.html";
  }catch(e){ registering = false; err.textContent = e.message; err.style.display = "block"; }
};

// بازیابی رمز
document.getElementById("reset-btn").onclick = async () => {
  const email = document.getElementById("reset-email").value.trim();
  const err = document.getElementById("reset-err");
  if(!email){ err.textContent = "ایمیل را وارد کنید"; err.style.display = "block"; return; }
  
  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/index.html', // هدایت پس از کلیک روی لینک ایمیل
  });
  
  if(error) { err.textContent = error.message; err.style.display = "block"; }
  else { alert("لینک بازیابی به ایمیل شما ارسال شد."); document.getElementById("back-to-login").click(); }
};
</script>
</body>
</html>
