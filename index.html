<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <!-- آیکون برنامه در بالای مرورگر و وب مانیفست -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="theme-color" content="#111827">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تقویم روزانه</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">

<!-- استایل واکنش‌گرا و جدول هفتگی مدارس منحصراً برای دستگاه‌های موبایل و دسکتاپ -->
<style>
@media(max-width: 768px) {
  body {
    padding: 12px 8px;
  }
  .header {
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 14px;
  }
  .logo {
    font-size: 22px;
  }
  .date-nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    gap: 12px;
  }
  .date-nav > div:first-of-type {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    order: -1;
  }
  #date-label {
    flex: 1;
    min-width: 0;
    font-size: 13px;
    padding: 6px 4px;
  }
  .card {
    padding: 14px;
    border-radius: 12px;
  }
  .card-title {
    font-size: 10px;
    margin-bottom: 12px;
  }
  .activity-map {
    gap: 4px;
  }
  .map-day {
    border-radius: 6px;
    font-size: 8px;
  }
  .map-day-num {
    top: 2px;
    inset-inline-start: 3px;
    font-size: 7px;
  }
  .tl-wrap {
    padding-right: 12px;
    margin-right: 4px;
  }
  .tl-item {
    padding: 8px 10px;
    gap: 8px;
  }
  .tl-title {
    font-size: 13px;
  }
  .tl-meta {
    gap: 4px;
    flex-wrap: wrap;
  }
  .tl-badge {
    font-size: 9px;
    padding: 1px 5px;
  }
  .tl-time {
    font-size: 10px;
    padding: 1px 5px;
  }
  .tl-dur {
    font-size: 10px;
  }
  .btn-del {
    width: 26px;
    height: 26px;
    font-size: 11px;
    border-radius: 6px;
  }
  /* ریسپانسیو کردن جدول برنامه هفتگی کلاس درس */
  .timetable-grid {
    grid-template-columns: 1fr !important;
    gap: 12px !important;
  }
  .timetable-day-col {
    min-height: 100px !important;
  }
}
</style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <span class="logo-dot"></span>
      تقویم روزانه
    </div>
    <div class="date-nav">
      <div style="display:flex; align-items:center; gap:10px">
        <span id="welcome-msg" style="font-size:13px; color:var(--muted)"></span>
        <button id="logout-btn" style="
          padding:6px 14px;
          border-radius:8px;
          border:1px solid var(--border2);
          background:var(--surface2);
          color:var(--muted);
          cursor:pointer;
          font-family:Vazirmatn,sans-serif;
          font-size:12px;
        ">خروج</button>
      </div>
      <button id="prev-day" title="روز قبل">&#8249;</button>
      <div id="date-label"></div>
      <button id="next-day" title="روز بعد">&#8250;</button>
      <button class="btn-today" id="btn-today">امروز</button>
      <select id="theme-select" class="theme-select" title="تم">
        <option value="dark">دارک</option>
        <option value="light">لایت</option>
        <option value="forest">سبز</option>
        <option value="sunset">غروب</option>
      </select>
    </div>
  </div>

  <div class="grid">
    <!-- نوار ناوبری پایین برای موبایل و بالای صفحه برای دسکتاپ -->
<nav class="app-nav">
  <button class="nav-btn active" data-tab="tab-timeline">
    <span class="nav-icon">📅</span> تایم‌لاین
  </button>
  <button class="nav-btn" data-tab="tab-add">
    <span class="nav-icon">➕</span> افزودن فعالیت
  </button>
  <button class="nav-btn" data-tab="tab-reports">
    <span class="nav-icon">📊</span> گزارش‌ها
  </button>
</nav>

<div class="tab-container">
  
  <!-- تب 1: تایم لاین -->
  <div id="tab-timeline" class="tab-section active">
    <div class="card" style="margin-bottom:0">
      <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
        <div>تایم‌لاین &mdash; <span id="tl-date" style="color:var(--accent2)"></span></div>
        <div style="display:flex; gap:4px;">
          <button id="view-daily-btn" style="padding:4px 10px; font-size:11px; border-radius:6px; cursor:pointer; background:var(--surface2); border:1px solid var(--border2); color:var(--text);">روزانه</button>
          <button id="view-weekly-btn" style="padding:4px 10px; background:var(--surface3); border:1px solid var(--border2); color:var(--muted); border-radius:6px; font-size:11px; cursor:pointer;">هفتگی</button>
        </div>
      </div>
      <div id="empty-msg" class="empty-msg">
        <div class="empty-icon">📅</div>
        هنوز فعالیتی برای این روز ثبت نکرده‌اید
      </div>
      <div class="tl-wrap" id="timeline" style="display:none"></div>
    </div>
  </div>

  <!-- تب 2: افزودن و مدیریت -->
  <div id="tab-add" class="tab-section">
    <!-- کارت ثبت فعالیت -->
    <div class="card">
       <!-- کدهای فرم ثبت فعالیت (title, start-time, end-time, pause, etc) را اینجا بگذارید -->
       <!-- دقیقاً همان کدهایی که قبلاً در <div class="card"> اول بود -->
    </div>

    <!-- کارت تعریف روتین -->
    <div class="card">
       <!-- کدهای روتین ثابت را اینجا بگذارید -->
    </div>
  </div>

  <!-- تب 3: گزارش‌ها -->
  <div id="tab-reports" class="tab-section">
    <!-- کارت گزارش دوره‌ای -->
    <div class="card">
       <!-- کدهای گزارش دوره‌ای -->
    </div>
    
    <!-- کارت نقشه ماهانه -->
    <div class="card">
       <!-- کدهای نقشه فعالیت -->
    </div>
  </div>

</div>

</div>

<!-- اتصال به اسکریپت ماژولار و بازسازی شده برنامه -->
<script type="module" src="./js/planner.js"></script>
</body>
</html>
