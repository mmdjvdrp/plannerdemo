<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعیین رمز عبور جدید</title>
  <style>
    body { font-family: Tahoma, sans-serif; background: #111827; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .box { width: 90%; max-width: 350px; background: #1f2937; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; background: #111827; border: 1px solid #374151; color: white; border-radius: 8px; outline: none; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #7c5cfc; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 15px; display: none; padding: 10px; border-radius: 8px; }
    .err { background: #fee2e2; color: #991b1b; }
    .ok { background: #d1fae5; color: #065f46; }
  </style>
</head>
<body>

<div class="box">
  <h2>تعیین رمز جدید</h2>
  <div id="status-msg" class="msg"></div>
  
  <input id="new-password" type="password" placeholder="رمز عبور جدید">
  <input id="confirm-password" type="password" placeholder="تکرار رمز عبور">
  
  <button id="reset-btn">تغییر رمز عبور</button>
</div>

<script type="module">
  import { supabase } from "./js/supabase.js";

  const btn = document.getElementById("reset-btn");
  const msg = document.getElementById("status-msg");

  // بررسی توکن در هنگام لود صفحه
  supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === "PASSWORD_RECOVERY") {
      console.log("آماده برای تغییر رمز");
    }
  });

  btn.onclick = async () => {
    const pass = document.getElementById("new-password").value;
    const confirm = document.getElementById("confirm-password").value;

    if (pass.length < 6) return showMsg("رمز باید حداقل ۶ کاراکتر باشد", true);
    if (pass !== confirm) return showMsg("رمزها همخوانی ندارند", true);

    btn.disabled = true;
    btn.textContent = "در حال بروزرسانی...";

    const { error } = await supabase.auth.updateUser({ password: pass });

    if (error) {
      showMsg("خطا: " + error.message, true);
      btn.disabled = false;
      btn.textContent = "تغییر رمز عبور";
    } else {
      showMsg("رمز با موفقیت تغییر کرد! انتقال به صفحه ورود...", false);
      setTimeout(() => window.location.href = "./login.html", 2500);
    }
  };

  function showMsg(text, isErr) {
    msg.textContent = text;
    msg.style.display = "block";
    msg.className = "msg " + (isErr ? "err" : "ok");
  }
</script>
</body>
</html>
