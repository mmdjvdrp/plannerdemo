<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعیین رمز عبور جدید</title>
  <style>
    body { font-family: Tahoma, sans-serif; background: #111827; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .box { width: 90%; max-width: 350px; background: #1f2937; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; background: #111827; border: 1px solid #374151; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
    button { width: 100%; padding: 12px; background: #7c5cfc; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { font-size: 13px; margin-top: 15px; padding: 10px; border-radius: 8px; display: none; }
    .error { background: #fee2e2; color: #991b1b; }
    .success { background: #d1fae5; color: #065f46; }
  </style>
</head>
<body>

<div class="box">
  <h2>رمز عبور جدید</h2>
  <p style="font-size: 12px; color: #9ca3af;">لطفاً رمز عبور جدید خود را وارد کنید</p>
  
  <div id="status-box" class="status"></div>

  <input id="pass" type="password" placeholder="رمز عبور جدید">
  <input id="confirm-pass" type="password" placeholder="تکرار رمز عبور">
  
  <button id="update-btn">بروزرسانی رمز عبور</button>
</div>

<script type="module">
  import { supabase } from "./js/supabase.js";

  const statusBox = document.getElementById("status-box");
  const btn = document.getElementById("update-btn");

  // چک کردن اینکه آیا کاربر نشست معتبری برای تغییر رمز دارد
  async function checkAuth() {
    const { data } = await supabase.auth.getSession();
    if (!data.session) {
      showStatus("لینک بازیابی منقضی شده یا نامعتبر است.", "error");
      btn.disabled = true;
    }
  }
  checkAuth();

  btn.onclick = async () => {
    const pass = document.getElementById("pass").value;
    const confirm = document.getElementById("confirm-pass").value;

    if (pass.length < 6) return showStatus("رمز باید حداقل ۶ کاراکتر باشد", "error");
    if (pass !== confirm) return showStatus("رمزها با هم یکی نیستند", "error");

    btn.disabled = true;
    btn.textContent = "در حال ذخیره...";

    const { error } = await supabase.auth.updateUser({ password: pass });

    if (error) {
      showStatus("خطا: " + error.message, "error");
      btn.disabled = false;
      btn.textContent = "بروزرسانی رمز عبور";
    } else {
      showStatus("رمز عبور با موفقیت تغییر کرد. هدایت به صفحه ورود...", "success");
      setTimeout(() => window.location.href = "./login.html", 2000);
    }
  };

  function showStatus(msg, type) {
    statusBox.textContent = msg;
    statusBox.className = "status " + type;
    statusBox.style.display = "block";
  }
</script>
</body>
</html>
