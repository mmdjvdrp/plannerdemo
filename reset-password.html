<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعیین رمز عبور جدید</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Vazirmatn, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .box {
      width: 90%;         
      max-width: 350px;   
      background: #1f2937;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 18px;
      box-sizing: border-box;
      background: #111827;
      border: 1px solid #374151;
      color: white;
      border-radius: 8px;
      outline: none;
      font-family: inherit;
    }
    button {
      width: 100%;
      padding: 10px;
      cursor: pointer;
      background: #7c5cfc;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: bold;
      transition: background 0.2s;
    }
    button:hover {
      background: #6244db;
    }
    button:disabled {
      background: #4b5563;
      cursor: not-allowed;
    }
    .err { color: #f87171; font-size: 13px; margin-top: -10px; margin-bottom: 12px; display: none; }
    .success-msg { color: #34d399; font-size: 13px; margin-top: -10px; margin-bottom: 12px; display: none; }
  </style>
</head>
<body>

<div class="box">
  <h2 style="margin-bottom:10px; text-align: center; font-size: 18px;">تعیین رمز عبور جدید</h2>
  <p style="font-size: 12px; color: #9ca3af; text-align: center; margin-bottom: 20px; line-height: 1.6;">
    رمز عبور جدید خود را وارد کنید. این رمز باید حداقل دارای ۶ کاراکتر باشد.
  </p>

  <div id="reset-form-container">
    <label style="font-size: 13px;">رمز عبور جدید</label>
    <input id="new-password" type="password" placeholder="حداقل ۶ کاراکتر">

    <label style="font-size: 13px;">تکرار رمز عبور جدید</label>
    <input id="confirm-password" type="password" placeholder="تکرار رمز عبور">

    <div class="err" id="reset-err"></div>
    <div class="success-msg" id="reset-success"></div>

    <button id="submit-btn">به‌روزرسانی رمز عبور</button>
  </div>
</div>

<script type="module">
  import { supabase } from "./js/supabase.js";

  // ابتدا بررسی می‌کنیم آیا توکن بازیابی در آدرس صفحه وجود دارد یا خیر
  const hash = window.location.hash;
  const errDiv = document.getElementById("reset-err");
  const successDiv = document.getElementById("reset-success");
  const submitBtn = document.getElementById("submit-btn");

  // بررسی وضعیت احراز هویت اولیه
  supabase.auth.onAuthStateChange(async (event, session) => {
    // اگر توکن معتبر باشد، سوپابیس کاربر را در وضعیت PASSWORD_RECOVERY قرار می‌دهد
    if (event === "PASSWORD_RECOVERY" || session) {
      console.log("کاربر آماده تغییر رمز عبور است.");
    }
  });

  submitBtn.onclick = async () => {
    const password = document.getElementById("new-password").value;
    const confirmPassword = document.getElementById("confirm-password").value;

    errDiv.style.display = "none";
    successDiv.style.display = "none";

    if (password.length < 6) {
      errDiv.textContent = "رمز عبور جدید باید حداقل ۶ کاراکتر باشد.";
      errDiv.style.display = "block";
      return;
    }

    if (password !== confirmPassword) {
      errDiv.textContent = "تکرار رمز عبور با رمز عبور اولیه همخوانی ندارد.";
      errDiv.style.display = "block";
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "در حال بروزرسانی...";

    // تغییر رمز عبور کاربر در دیتابیس سوپابیس
    const { error } = await supabase.auth.updateUser({ password: password });

    if (error) {
      errDiv.textContent = "خطا در تغییر رمز: " + error.message;
      errDiv.style.display = "block";
      submitBtn.disabled = false;
      submitBtn.textContent = "به‌روزرسانی رمز عبور";
    } else {
      successDiv.textContent = "رمز عبور شما با موفقیت تغییر کرد. در حال انتقال به صفحه ورود...";
      successDiv.style.display = "block";
      
      // خارج کردن کاربر از نشست فعلی برای امنیت بیشتر
      await supabase.auth.signOut();

      // انتقال به صفحه ورود پس از ۳ ثانیه
      setTimeout(() => {
        window.location.href = "./login.html";
      }, 3000);
    }
  };
</script>

</body>
</html>
